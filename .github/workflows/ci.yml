name: edge-vision CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (CPU only — no gpu/trt extras in CI)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests scripts dashboard

      - name: Format check
        run: ruff format --check src tests scripts dashboard

      - name: Test
        run: pytest tests/ -v --tb=short -m "not gpu and not trt and not slow"
